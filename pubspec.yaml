name: kado_ceria
description: "kado ceria"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  page_flip: ^0.2.5+1
  just_audio: ^0.10.4
  provider: ^6.0.5

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo/hade.png"
  min_sdk_android: 21
  min_sdk_ios: 11.0
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo/hade.png"

flutter:
  uses-material-design: true
  assets:
    - assets/dongeng_janiti/halaman/
    - assets/dongeng_janiti/audio_narasi_indonesia/
    - assets/dongeng_janiti/audio_narasi_sunda/
    - assets/dongeng_janiti/audio_objek/
    - assets/sakeclak_cihujan_hayang_ka_sagara/halaman/
    - assets/sakeclak_cihujan_hayang_ka_sagara/audio_narasi_indonesia/
    - assets/sakeclak_cihujan_hayang_ka_sagara/audio_narasi_sunda/
    - assets/sakeclak_cihujan_hayang_ka_sagara/audio_objek/
    - assets/metadata.json
    - assets/logo/
    - assets/
